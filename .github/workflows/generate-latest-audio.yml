name: Generate Latest Audio

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/generate-latest-audio.yml'
  workflow_dispatch:
    inputs:
      description:
        description: 'Generate audio for ONLY the single most recent briefing (Fast Test)'
        required: false

jobs:
  generate-audio:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r .scripts/requirements.txt

      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        if: ${{ env.HAS_GCP_PROJECT != '' }}
        env:
          HAS_GCP_PROJECT: ${{ secrets.VERTEX_PROJECT_ID }}
        with:
          workload_identity_provider: '${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}'
          service_account: '${{ secrets.GCP_SERVICE_ACCOUNT }}'

      - name: Run Single Audio Backfill
        env:
          VERTEX_PROJECT_ID: ${{ secrets.VERTEX_PROJECT_ID }}
          VERTEX_LOCATION: ${{ secrets.VERTEX_LOCATION }}
          GOOGLE_CLOUD_PROJECT: ${{ secrets.VERTEX_PROJECT_ID }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          LLM_FALLBACK_API_KEY: ${{ secrets.LLM_FALLBACK_API_KEY }}
          LLM_FALLBACK_BASE_URL: ${{ secrets.LLM_FALLBACK_BASE_URL }}
          LLM_FALLBACK_MODEL: ${{ secrets.LLM_FALLBACK_MODEL }}
        run: |
          FORCE_REGEN=1 python3 .scripts/stage_narrate.py

      - name: Commit and Push changes
        # always(): persisted LLM scripts must survive a failed TTS step
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add audio
          git add content 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "audio: update latest briefing with vertex TTS"
            git pull --rebase --autostash origin main
            git push
          else
            echo "No changes detected, skipping commit."
          fi
# trigger
