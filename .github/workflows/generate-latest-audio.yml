name: Generate Latest Audio

on:
  workflow_dispatch:
    inputs:
      description:
        description: 'Generate audio for ONLY the single most recent briefing (Fast Test)'
        required: false

jobs:
  generate-audio:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r .scripts/requirements.txt

      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        if: ${{ env.HAS_GCP_PROJECT != '' }}
        env:
          HAS_GCP_PROJECT: ${{ secrets.VERTEX_PROJECT_ID }}
        with:
          workload_identity_provider: '${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}'
          service_account: '${{ secrets.GCP_SERVICE_ACCOUNT }}'

      - name: Run Single Audio Backfill
        env:
          VERTEX_PROJECT_ID: ${{ secrets.VERTEX_PROJECT_ID }}
          VERTEX_LOCATION: ${{ secrets.VERTEX_LOCATION }}
          GOOGLE_CLOUD_PROJECT: ${{ secrets.VERTEX_PROJECT_ID }}
        run: |
          python3 .scripts/generate_latest_audio.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add audio/*.mp3
          if ! git diff --staged --quiet; then
            git commit -m "audio: update latest briefing with vertex TTS [skip ci]"
            git pull --rebase --autostash origin main
            git push
          else
            echo "No changes detected, skipping commit."
          fi
