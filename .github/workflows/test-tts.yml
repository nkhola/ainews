name: Test Gemini TTS

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/test-tts.yml'
      - '.scripts/test_vertex_tts.py'

jobs:
  test-tts:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install google-cloud-texttospeech
      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        if: ${{ secrets.VERTEX_PROJECT_ID != '' }}
        with:
          workload_identity_provider: '${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}'
          service_account: '${{ secrets.GCP_SERVICE_ACCOUNT }}'
      - name: Run Test
        env:
          VERTEX_PROJECT_ID: ${{ secrets.VERTEX_PROJECT_ID }}
          VERTEX_LOCATION: ${{ secrets.VERTEX_LOCATION }}
        run: python .scripts/test_vertex_tts.py > test-results.txt 2>&1 || true
      - name: Commit Results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add test-results.txt
          git commit -m "chore: add test results" || true
          git pull --rebase origin main || true
          git push || true
