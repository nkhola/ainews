name: Daily AI & Finance Briefing

on:
  schedule:
    # Run at 13:00 UTC (which is 9:00 AM Eastern Time)
    - cron: '0 13 * * *'
  workflow_dispatch: # Allow running manually from the Actions tab

jobs:
  generate-site:
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
    # We need permission to push back to the repository
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r .scripts/requirements.txt

      - name: Generate Briefing HTML
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
        run: |
          python .scripts/generate_site.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add *.html
          # Only commit if there are changes
          git diff --staged --quiet || (git commit -m "Automated daily briefing [skip ci]" && git push)
