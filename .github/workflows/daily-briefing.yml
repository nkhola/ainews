name: Daily AI & Finance Briefing

# Three-stage pipeline with file-based contracts:
#   synthesize (LLM tokens) -> render (free) -> narrate (TTS)
# Each stage commits its own artifact and skips itself when the artifact
# already exists, so "Re-run failed jobs" after a partial failure never
# repeats the expensive synthesis.

on:
  schedule:
    # 13:15 UTC = 9:15 AM Eastern
    - cron: '15 13 * * *'
    # 22:30 UTC = 6:30 PM Eastern
    - cron: '30 22 * * *'

  workflow_dispatch:
    inputs:
      force_time:
        description: 'Force AM or PM (leave empty for auto)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - 'AM'
          - 'PM'
      force_regen:
        description: 'Regenerate even if artifacts exist'
        required: false
        default: false
        type: boolean

concurrency:
  group: daily-briefing
  cancel-in-progress: false

jobs:
  synthesize:
    name: "Stage 1: Synthesize (LLM)"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r .scripts/requirements.txt

      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        if: ${{ env.HAS_GCP_PROJECT != '' }}
        env:
          HAS_GCP_PROJECT: ${{ secrets.VERTEX_PROJECT_ID }}
        with:
          workload_identity_provider: '${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}'
          service_account: '${{ secrets.GCP_SERVICE_ACCOUNT }}'

      - name: Synthesize content
        env:
          FORCE_TIME_LABEL: ${{ github.event.inputs.force_time }}
          FORCE_REGEN: ${{ github.event.inputs.force_regen == 'true' && '1' || '' }}
          VERTEX_PROJECT_ID: ${{ secrets.VERTEX_PROJECT_ID }}
          VERTEX_LOCATION: ${{ secrets.VERTEX_LOCATION }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          LLM_FALLBACK_API_KEY: ${{ secrets.LLM_FALLBACK_API_KEY }}
          LLM_FALLBACK_BASE_URL: ${{ secrets.LLM_FALLBACK_BASE_URL }}
          LLM_FALLBACK_MODEL: ${{ secrets.LLM_FALLBACK_MODEL }}
        run: python3 .scripts/stage_synthesize.py

      - name: Commit content
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add content
          if ! git diff --staged --quiet; then
            git commit -m "content: daily briefing synthesis"
            git pull --rebase --autostash origin main
            git push
          else
            echo "No new content, skipping commit."
          fi

  render:
    name: "Stage 2: Render (free)"
    runs-on: ubuntu-latest
    needs: synthesize
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r .scripts/requirements.txt

      - name: Render pages and index
        env:
          FORCE_REGEN: ${{ github.event.inputs.force_regen == 'true' && '1' || '' }}
        run: python3 .scripts/stage_render.py

      - name: Commit pages
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add '*.html' index.html
          if ! git diff --staged --quiet; then
            git commit -m "site: render briefing pages"
            git pull --rebase --autostash origin main
            git push
          else
            echo "No page changes, skipping commit."
          fi

  narrate:
    name: "Stage 3: Narrate (TTS)"
    runs-on: ubuntu-latest
    needs: render
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r .scripts/requirements.txt

      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        if: ${{ env.HAS_GCP_PROJECT != '' }}
        env:
          HAS_GCP_PROJECT: ${{ secrets.VERTEX_PROJECT_ID }}
        with:
          workload_identity_provider: '${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}'
          service_account: '${{ secrets.GCP_SERVICE_ACCOUNT }}'

      - name: Generate narration
        env:
          FORCE_REGEN: ${{ github.event.inputs.force_regen == 'true' && '1' || '' }}
          VERTEX_PROJECT_ID: ${{ secrets.VERTEX_PROJECT_ID }}
          VERTEX_LOCATION: ${{ secrets.VERTEX_LOCATION }}
          GOOGLE_CLOUD_PROJECT: ${{ secrets.VERTEX_PROJECT_ID }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          LLM_FALLBACK_API_KEY: ${{ secrets.LLM_FALLBACK_API_KEY }}
          LLM_FALLBACK_BASE_URL: ${{ secrets.LLM_FALLBACK_BASE_URL }}
          LLM_FALLBACK_MODEL: ${{ secrets.LLM_FALLBACK_MODEL }}
        run: python3 .scripts/stage_narrate.py

      - name: Commit audio
        # always(): persisted LLM scripts must survive a failed TTS step
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add audio content
          if ! git diff --staged --quiet; then
            git commit -m "audio: narrate latest briefing"
            git pull --rebase --autostash origin main
            git push
          else
            echo "No audio changes, skipping commit."
          fi
