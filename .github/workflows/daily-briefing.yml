name: Daily AI & Finance Briefing

on:
  schedule:
    # Run at 13:15 UTC (which is 9:15 AM Eastern Time)
    - cron: '15 13 * * *'
    # Run at 22:30 UTC (which is 6:30 PM Eastern Time)
    - cron: '30 22 * * *'

  workflow_dispatch:
    inputs:
      force_time:
        description: 'Force AM or PM (leave empty for auto)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - 'AM'
          - 'PM'

jobs:
  generate-site:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug Environment
        run: |
          echo "Current Date (UTC): $(date -u)"
          echo "Python version: $(python3 --version)"
          echo "Branch: ${{ github.ref }}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r .scripts/requirements.txt

      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        # Only run if VERTEX_PROJECT_ID is provided
        if: ${{ env.HAS_GCP_PROJECT != '' }}
        env:
          HAS_GCP_PROJECT: ${{ secrets.VERTEX_PROJECT_ID }}
        with:
          workload_identity_provider: '${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}'
          service_account: '${{ secrets.GCP_SERVICE_ACCOUNT }}'

      - name: Generate Briefing HTML
        env:
          FORCE_TIME_LABEL: ${{ github.event.inputs.force_time }}
          VERTEX_PROJECT_ID: ${{ secrets.VERTEX_PROJECT_ID }}
          VERTEX_LOCATION: ${{ secrets.VERTEX_LOCATION }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          LLM_FALLBACK_API_KEY: ${{ secrets.LLM_FALLBACK_API_KEY }}
          LLM_FALLBACK_BASE_URL: ${{ secrets.LLM_FALLBACK_BASE_URL }}
          LLM_FALLBACK_MODEL: ${{ secrets.LLM_FALLBACK_MODEL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CANARY_TRIED=false
          CANARY_FAILED=false
          
          if git ls-remote --exit-code --heads origin refactor-modularization >/dev/null 2>&1; then
            echo "Refactor branch found! Attempting canary run..."
            git fetch origin refactor-modularization
            git checkout origin/refactor-modularization
            CANARY_TRIED=true
            
            echo "Running modular pipeline..."
            if python3 .scripts/pipeline.py; then
               echo "Canary run succeeded!"
               mkdir -p /tmp/canary_out/audio
               cp *.html /tmp/canary_out/ 2>/dev/null || true
               rm -f /tmp/canary_out/index.html
               cp audio/*.mp3 /tmp/canary_out/audio/ 2>/dev/null || true
               git checkout --force main
               cp -r /tmp/canary_out/* ./
               python3 -c "import sys, os, datetime; sys.path.insert(0, '.scripts'); import generate_site; generate_site.update_index_page(os.getcwd(), datetime.datetime.now().strftime('%Y-%m-%d'))"
            else
               echo "Canary run failed!"
               CANARY_FAILED=true
               git checkout --force main
               # Reset any uncommitted garbage from the failed canary
               git clean -fd
               git checkout -- .
            fi
          fi
          
          if [ "$CANARY_TRIED" = false ] || [ "$CANARY_FAILED" = true ]; then
             echo "Running standard monolith pipeline on main branch..."
             python3 .scripts/generate_site.py
          fi
          
          if [ "$CANARY_FAILED" = true ]; then
             echo "Reporting canary failure via GitHub Issues..."
             gh issue create --title "🚨 Canary Run Failed: refactor-modularization" --body "The automated daily run attempted to use the \`refactor-modularization\` branch, but the pipeline script failed. It successfully fell back to the \`main\` branch monolith. Please check the Action logs for details." || echo "Could not create issue."
          fi

      - name: Verify Generated Files
        run: |
          ls -lh *.html
          ls -lh index.html

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add *.html index.html audio/*.mp3
          # Only commit if there are changes
          if ! git diff --staged --quiet; then
            git commit -m "Automated daily briefing"
            git pull --rebase --autostash origin main
            git push
          else
            echo "No changes detected, skipping commit."
          fi
